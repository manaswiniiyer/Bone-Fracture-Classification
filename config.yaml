# Bone Fracture Classification Configuration

# Dataset Configuration
data:
  data_dir: "dataset"
  train_split: 0.7
  val_split: 0.1
  test_split: 0.2
  batch_size: 4
  num_workers: 4
  image_size: 224
  
# Model Configuration
model:
  type: efficientnet # Options: "vit", "efficientnet", "hybrid"
  num_classes: 5
  pretrained: false
  
# Training Configuration
training:
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  warmup_epochs: 5
  early_stopping_patience: 15
  gradient_clip_norm: 1.0
  mixed_precision: true
  device: "auto"  # "auto", "cuda", "cpu"
  
# Loss Configuration
loss:
  type: "weighted_cross_entropy"  # Options: "cross_entropy", "weighted_cross_entropy", "focal"
  
# Augmentation Configuration
augmentation:
  horizontal_flip_prob: 0.7
  rotation_degrees: 35
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: 8
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  
# Checkpointing
checkpoint:
  save_dir: "checkpoints"
  save_best_only: true
  monitor: "val_loss"
  mode: "min"
  
# Results
results:
  output_dir: "results"
  
# Gradio App
app:
  title: "Bone Fracture Classification"
  description: "Upload an X-ray image to classify the type of fracture"
  demo_mode: false  # Set to true for demo with dummy data
  
# Class Names
classes:
  - comminuted
  - greenstick
  - hairline
  - impacted
  - spiral
